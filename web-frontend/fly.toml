# fly.toml — https://fly.io/docs/reference/configuration/
app = 'stravo-web'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[build.args]
  VITE_API_BASE_URL = 'https://stravo-api.fly.dev/api'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
