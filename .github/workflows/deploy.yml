name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install web dependencies
        working-directory: web-frontend
        run: npm ci

      - name: Build web frontend
        working-directory: web-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://stravo-api.fly.dev/api

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test-and-build
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Check Fly token is configured
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::FLY_API_TOKEN secret is missing."
            echo "Create one: fly tokens create org -x 999999h -o personal"
            echo "Then add at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        working-directory: backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    concurrency: deploy-web
    steps:
      - uses: actions/checkout@v4

      - name: Check Fly token is configured
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::error::FLY_API_TOKEN secret is missing."
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy web frontend
        working-directory: web-frontend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
